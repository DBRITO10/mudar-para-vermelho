<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedores - Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --primary: #d32f2f;
        --neutral-dark: #212121;
        --bg-body: #f5f5f5;
        --bg-card: #ffffff;
        --text-dark: #333333;
        --border: #e0e0e0;
        --warning: #f57c00; /* Adicionado */
        --danger: #c62828;  /* Adicionado */
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--bg-body);
        min-height: 100vh;
        color: var(--text-dark);
    }

    /* Barra Superior */
    .top-nav {
        background: var(--bg-card);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* BOTÃO VOLTAR PRETO */
    .btn-voltar {
        color: var(--neutral-dark);
        text-decoration: none;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .btn-logout {
        background: var(--primary);
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    /* Painéis */
    .glass-panel {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 25px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }

    h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label { font-size: 0.75rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
    input { padding: 10px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
    input:focus { border-color: var(--primary); }

    .btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
    }

    /* Garante que os botões tenham tamanho e visibilidade */
    .btn-action {
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        color: white;
        margin-left: 5px;
        font-weight: 600;
        display: inline-block; /* Importante para visibilidade */
    }

    /* BOTÃO CANCELAR/EDIÇÃO PRETO */
    .btn-cancelar {
        background: var(--neutral-dark); /* PRETO */
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Tabela */
    .table-container { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: #fafafa; color: #555; padding: 12px; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; text-align: center; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; }

    @media (max-width: 600px) {
        .container { margin: 15px auto; padding: 0 10px; }
    }
</style>
</head>
<body>

    <nav class="top-nav">
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="pagina.html" style="color: var(--neutral-dark); text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
            <span style="font-weight: bold; letter-spacing: 1px;">FORNECEDORES</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="user-badge" id="labelUser">
                <i class="fas fa-user-circle"></i> Carregando...
            </div>
            <button class="btn-logout" id="btnLogout">SAIR</button>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <h2><i class="fas fa-plus-circle"></i> Novo Fornecedor</h2>
            <div class="form-grid">
                <div class="field-group">
                    <label>NOME COMPLETO / RAZÃO SOCIAL:</label>
                    <input type="text" id="nomeF" placeholder="Ex: Samsung Brasil">
                </div>
                <div class="field-group">
                    <label>CNPJ:</label>
                    <input type="text" id="cnpjF" placeholder="00.000.000/0000-00">
                </div>
                <div class="field-group">
                    <label>E-MAIL DE CONTATO:</label>
                    <input type="email" id="emailF" placeholder="email@fornecedor.com">
                </div>
                <div class="field-group">
                    <label>TELEFONE:</label>
                    <input type="text" id="telF" placeholder="(00) 00000-0000">
                </div>
            </div>
            <button onclick="salvarF()" class="btn-primary">CADASTRAR FORNECEDOR</button>
        </div>

        <div class="glass-panel" style="padding: 0; overflow: hidden;">
            <div class="table-container"> <table>
                    <thead>
                        <tr>
                            <th style="text-align: left; padding-left: 25px;">FORNECEDOR</th>
                            <th>CNPJ</th>
                            <th>E-MAIL</th>
                            <th>TELEFONE</th>
                            <th style="text-align: right; padding-right: 25px;">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="listaF"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-top: 0;">Editar Fornecedor</h3>
            <div class="field-group" style="margin-bottom: 10px;">
                <label>NOME:</label>
                <input type="text" id="editNome">
            </div>
            <div class="field-group" style="margin-bottom: 10px;">
                <label>CNPJ:</label>
                <input type="text" id="editCnpj">
            </div>
            <div class="field-group" style="margin-bottom: 10px;">
                <label>E-MAIL:</label>
                <input type="text" id="editEmail">
            </div>
            <div class="field-group" style="margin-bottom: 15px;">
                <label>TELEFONE:</label>
                <input type="text" id="editTel">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="fecharModal()" class="btn-cancelar">CANCELAR</button>
    
               <button id="btnConfirmarEdit" class="btn-action">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/fornecedores.js"></script>
</body>
</html>
