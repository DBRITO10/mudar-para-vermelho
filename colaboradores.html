<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Gerenciar Equipe Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    /* PALETA MODERNA: VERMELHO, BRANCO E CINZA */
    :root {
        --primary: #d32f2f;      /* Vermelho principal */
        --secondary: #f5f5f5;    /* Cinza muito claro para o fundo */
        --accent: #d32f2f;       /* Vermelho para destaques */
        --text-dark: #333333;    /* Texto escuro */
        --text-light: #666666;   /* Texto secundário */
        --white: #ffffff;
        --border-color: #e0e0e0;
        --danger: #c62828;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background-color: var(--secondary); 
        color: var(--text-dark); 
        margin: 0; 
        padding-top: 80px; 
        min-height: 100vh;
    }
    
    /* Barra Superior Fixa */
    .top-nav {
        background: var(--white); 
        color: var(--text-dark); 
        padding: 0 30px; 
        height: 65px;
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        position: fixed; 
        top: 0; left: 0; right: 0; 
        z-index: 1000;
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .btn-voltar { 
        color: var(--primary); 
        text-decoration: none; 
        font-weight: 600; 
        transition: 0.3s; 
    }

    .container { 
        max-width: 900px; 
        margin: auto; 
        padding: 0 20px; 
    }
    
    /* Campo de Busca Clean */
    .search-container { margin-bottom: 25px; }
    .search-container input {
        width: 100%; 
        padding: 14px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color);
        background: var(--white); 
        font-size: 1rem; 
        outline: none; 
        color: var(--text-dark);
        transition: 0.3s;
    }
    .search-container input:focus { border-color: var(--primary); }

    /* Cards de Usuário Limpos */
    .user-card {
        background: var(--white); 
        border-radius: 10px; 
        padding: 20px; 
        margin-bottom: 12px;
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        border: 1px solid var(--border-color);
        border-left: 5px solid #ccc; /* Cor neutra padrão */
        transition: 0.3s;
        box-shadow: 0 3px 6px rgba(0,0,0,0.03);
    }
    
    /* Destaques por Cargo */
    .role-admin { border-left-color: var(--primary); }
    .role-lider { border-left-color: #2e7d32; } /* Um verde mais sóbrio */

    .user-info b { 
        display: block; 
        font-size: 1.1rem; 
        color: var(--text-dark); 
        margin-bottom: 2px;
    }
    .user-info span { 
        font-size: 0.85rem; 
        color: var(--text-light); 
    }
    .user-info small { 
        color: var(--primary); 
        font-weight: bold; 
        text-transform: uppercase; 
        font-size: 0.75rem;
    }

    /* Botões de Ação */
    .actions { display: flex; gap: 10px; }
    .btn { 
        border: none; 
        padding: 9px 15px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-size: 0.85rem; 
        font-weight: 600;
        transition: 0.3s; 
        color: white;
    }
    
    .btn-role { 
        background: var(--secondary); 
        color: var(--text-dark);
        border: 1px solid var(--border-color); 
    }
    .btn-role:hover { background: var(--border-color); }

    .btn-delete { 
        background: #feeceb; 
        color: var(--danger);
        border: 1px solid #f8d7da;
    }
    .btn-delete:hover { background: var(--danger); color: white; }

    @media (max-width: 600px) {
        .user-card { flex-direction: column; text-align: center; gap: 15px; }
        .actions { width: 100%; justify-content: center; }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="admin_painel.html" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>
        <i class="fas fa-users-cog" style="color: var(--accent);"></i>
        <span>GESTÃO DE EQUIPE</span>
    </div>
    <div id="countUsers" style="font-size: 0.8rem; font-weight: bold;">...</div>
</nav>

<div class="container">
    <div class="search-container">
        <input type="text" id="buscaUser" placeholder="🔍 Buscar por nome, loja ou e-mail..." onkeyup="filtrarUsers()">
    </div>
    <div id="listaUsuarios"></div>
</div>

<script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    let usuarios = [];

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
        else carregarUsuarios();
    });

    function carregarUsuarios() {
        // Busca todos ordenados por nome
        const q = query(collection(db, "users"), orderBy("nomeCompleto", "asc"));
        
        onSnapshot(q, (snapshot) => {
            usuarios = [];
            snapshot.forEach(res => {
                const data = res.data();
                // REGRA: Só adiciona à lista se tiver o campo 'unidade'
                if (data.unidade) {
                    usuarios.push({ id: res.id, ...data });
                }
            });
            document.getElementById("countUsers").innerText = `${usuarios.length} USUÁRIOS`;
            renderizar(usuarios);
        });
    }

    function renderizar(lista) {
        const cont = document.getElementById("listaUsuarios");
        cont.innerHTML = lista.length === 0 ? '<p style="text-align:center; padding:20px; color:#ddd;">Nenhum usuário com unidade cadastrada.</p>' : "";

        lista.forEach(u => {
            const card = document.createElement("div");
            card.className = `user-card ${u.role === 'admin' ? 'role-admin' : 'role-lider'}`;
            
            card.innerHTML = `
                <div class="user-info">
                    <b>${u.nomeCompleto}</b>
                    <span>${u.email}</span>
                    <small>${u.unidade} — ${u.role === 'admin' ? 'Administrador' : 'Líder'}</small>
                </div>
                <div class="actions">
                    <button class="btn btn-role" onclick="alterarCargo('${u.id}', '${u.role}')">
                        <i class="fas fa-sync-alt"></i> Alternar Cargo
                    </button>
                    <button class="btn btn-delete" onclick="removerUsuario('${u.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>`;
            cont.appendChild(card);
        });
    }

    window.filtrarUsers = () => {
        const txt = document.getElementById("buscaUser").value.toLowerCase();
        const filtrados = usuarios.filter(u => 
            u.nomeCompleto.toLowerCase().includes(txt) || 
            u.unidade.toLowerCase().includes(txt) ||
            u.email.toLowerCase().includes(txt)
        );
        renderizar(filtrados);
    };

    window.alterarCargo = async (id, roleAtual) => {
        const novoRole = roleAtual === 'admin' ? 'lider_loja' : 'admin';
        if(confirm("Alterar cargo deste colaborador?")) {
            await updateDoc(doc(db, "users", id), { role: novoRole });
        }
    };

    window.removerUsuario = async (id) => {
        if(confirm("Excluir este colaborador permanentemente?")) {
            await deleteDoc(doc(db, "users", id));
        }
    };
</script>
</body>
</html>
