<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Gestão de Estoque Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    /* PALETA MODERNA: VERMELHO, BRANCO E CINZA */
    :root { 
        --primary: #d32f2f;
        --secondary: #fdf2f2;      /* ALTERADO: Tom rosado bem suave */
        --accent: #d32f2f;
        --success: #2e7d32;
        --text-dark: #333333;
        --text-light: #666666;
        --white: #ffffff;
        --border-color: #f0d8d8;       /* DICA: Deixe a borda levemente rosada também */
        --danger: #c62828;
    }

    body { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        background-color: var(--secondary); 
        margin: 0; 
        padding-top: 80px; 
        min-height: 100vh;
        color: var(--text-dark);
    }
    
    .top-nav {
        background: var(--white); 
        padding: 0 25px; height: 65px;
        display: flex; justify-content: space-between; align-items: center;
        position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .nav-left { display: flex; align-items: center; gap: 15px; }
    .btn-voltar { color: var(--primary); text-decoration: none; font-weight: 600; }

    .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
    
    /* FORMULÁRIO LIMPO */
    .card-form { 
        background: var(--white); 
        padding: 25px; border-radius: 12px; 
        border: 1px solid var(--border-color);
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }
    
    .card-form h2 { margin-top: 0; color: var(--text-dark); font-size: 1.2rem; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 20px; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-size: 0.75rem; margin-bottom: 6px; color: var(--text-light); font-weight: 600; text-transform: uppercase; }
    
    input { 
        padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); 
        background: #fafafa; color: var(--text-dark); outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); background: var(--white); }

    .btn-salvar { 
        background: var(--success); color: white; border: none; padding: 12px 25px; 
        border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
    }
    .btn-salvar:hover { background: #1b5e20; }

    /* LISTA DE ITENS */
    .card-lista { 
        background: var(--white); 
        border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }
    
    .busca-box input { width: 100%; margin-bottom: 20px; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; color: var(--text-dark); }
    th { text-align: left; padding: 15px; border-bottom: 2px solid var(--secondary); color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
    td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
    
    tr:hover { background: #fafafa; }

    .btn-acao { 
        border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; 
        font-size: 0.75rem; margin-right: 5px; color: white; font-weight: 600; transition: 0.2s;
    }
    .btn-edit { background: #455a64; }
    .btn-del { background: var(--danger); }
    .btn-entrada { background: var(--primary); }
    .btn-acao:hover { opacity: 0.8; }

    .btn-sair { background: #feeceb; color: var(--danger); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; border: 1px solid #f8d7da; }
    .btn-sair:hover { background: var(--danger); color: white; }

    @media (max-width: 600px) {
        .container { padding: 0 10px; }
        .nav-left span { display: none; }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-left">
        <a href="admin_painel.html" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>
        <i class="fas fa-box-open" style="color: var(--accent);"></i>
        <span>ESTOQUE TRANSBORDO</span>
    </div>
    <a href="#" id="btnLogout" class="btn-sair">SAIR</a>
</nav>

<div class="container">
    <div class="card-form">
        <h2 id="formTitle"><i class="fas fa-plus-circle" style="color: var(--accent);"></i> Novo Cadastro / Entrada</h2>
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div class="input-group">
                <label>Fornecedor</label>
                <input type="text" id="f" placeholder="Ex: ELECTROLUX">
            </div>
            <div class="input-group">
                <label>Código</label>
                <input type="text" id="c" placeholder="Ex: 102030">
            </div>
            <div class="input-group">
                <label>Descrição do Produto</label>
                <input type="text" id="d" placeholder="Ex: Smart TV 50...">
            </div>
            <div class="input-group">
                <label>Valor Unitário (R$)</label>
                <input type="number" step="0.01" id="v" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Qtd Inicial</label>
                <input type="number" id="q" value="0">
            </div>
        </div>
        <button class="btn-salvar" id="btnPrincipal" onclick="salvarProduto()">SALVAR NA VITRINE</button>
        <button id="btnCancelaEdit" style="display:none; background:#e0e0e0; border:none; color:#333; margin-top:10px; padding:10px; cursor:pointer; width:100%; border-radius:6px; font-weight:bold;" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
    </div>

    <div class="card-lista">
        <div class="busca-box">
            <input type="text" id="inputBusca" placeholder="🔍 Filtrar por descrição ou código..." onkeyup="filtrar()">
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>FORNECEDOR</th>
                        <th>CÓDIGO</th>
                        <th>DESCRIÇÃO</th>
                        <th>VALOR</th>
                        <th>QTD</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    // --- LÓGICA PRESERVADA INTEGRALMENTE ---
    let todosProdutos = [];

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
        else carregarProdutos();
    });

    function carregarProdutos() {
        const q = query(collection(db, "produtos_transbordo"), orderBy("desc", "asc"));
        onSnapshot(q, (snapshot) => {
            todosProdutos = [];
            snapshot.forEach(doc => todosProdutos.push({ id: doc.id, ...doc.data() }));
            renderizar(todosProdutos);
        });
    }

    window.salvarProduto = async () => {
        const id = document.getElementById("editId").value;
        const p = {
            fornecedor: document.getElementById("f").value.toUpperCase(),
            codigo: document.getElementById("c").value,
            desc: document.getElementById("d").value.toUpperCase(),
            valor: parseFloat(document.getElementById("v").value || 0),
            qtd: parseInt(document.getElementById("q").value || 0)
        };

        if(!p.fornecedor || !p.codigo || !p.desc) return alert("Preencha os campos obrigatórios!");

        try {
            if(id) {
                await updateDoc(doc(db, "produtos_transbordo", id), p);
                alert("Atualizado!");
                cancelarEdicao();
            } else {
                await addDoc(collection(db, "produtos_transbordo"), p);
                alert("Cadastrado!");
                limparCampos();
            }
        } catch (e) { alert("Erro ao salvar"); }
    };

    function renderizar(lista) {
        const html = lista.map(p => `
            <tr>
                <td>${p.fornecedor}</td>
                <td>${p.codigo}</td>
                <td>${p.desc}</td>
                <td>R$ ${p.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                <td style="font-weight:bold; color:${p.qtd > 0 ? 'var(--success)' : '#ff4d4d'}">${p.qtd}</td>
                <td>
                    <button class="btn-acao btn-entrada" onclick="darEntrada('${p.id}')" title="Dar Entrada">+ QTD</button>
                    <button class="btn-acao btn-edit" onclick="prepararEdicao('${p.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-acao btn-del" onclick="excluir('${p.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
        document.getElementById("corpoTabela").innerHTML = html;
    }

    window.filtrar = () => {
        const t = document.getElementById("inputBusca").value.toLowerCase();
        const filtrados = todosProdutos.filter(p => p.desc.toLowerCase().includes(t) || p.codigo.toLowerCase().includes(t));
        renderizar(filtrados);
    };

    window.excluir = async (id) => {
        if(confirm("Excluir este produto permanentemente?")) await deleteDoc(doc(db, "produtos_transbordo", id));
    };

    window.darEntrada = async (id) => {
        const qtdAdicional = prompt("Quantas unidades deseja ADICIONAR ao estoque atual?");
        if(!qtdAdicional || isNaN(qtdAdicional)) return;
        const p = todosProdutos.find(x => x.id === id);
        await updateDoc(doc(db, "produtos_transbordo", id), { qtd: p.qtd + parseInt(qtdAdicional) });
        alert("Estoque atualizado!");
    };

    window.prepararEdicao = (id) => {
        const p = todosProdutos.find(x => x.id === id);
        document.getElementById("f").value = p.fornecedor;
        document.getElementById("c").value = p.codigo;
        document.getElementById("d").value = p.desc;
        document.getElementById("v").value = p.valor;
        document.getElementById("q").value = p.qtd;
        document.getElementById("editId").value = id;
        document.getElementById("formTitle").innerText = "Editando: " + p.desc;
        document.getElementById("btnPrincipal").innerText = "ATUALIZAR CADASTRO";
        document.getElementById("btnCancelaEdit").style.display = "block";
        window.scrollTo(0,0);
    };

    window.cancelarEdicao = () => {
        limparCampos();
        document.getElementById("editId").value = "";
        document.getElementById("formTitle").innerText = "Novo Cadastro / Entrada";
        document.getElementById("btnPrincipal").innerText = "SALVAR NA VITRINE";
        document.getElementById("btnCancelaEdit").style.display = "none";
    };

    function limparCampos() {
        ["f","c","d","v","q"].forEach(id => document.getElementById(id).value = (id === "q" ? "0" : ""));
    }

    document.getElementById("btnLogout").onclick = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
