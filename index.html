<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simonetti - Gestão de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
    #error {
        min-height: 20px;
        margin-top: 15px;
        padding: 10px 15px;
        font-weight: 600;
        font-size: 0.85rem;
        display: block;
        
        /* Estilização Clean Red & White */
        background-color: #feeceb; /* Fundo rosa bem claro */
        color: var(--danger);      /* Vermelho de erro */
        border: 1px solid #f8d7da; /* Borda suave */
        border-radius: 6px;        /* Bordas arredondadas */
        text-align: center;
    }
</style>
</head>
<body>
    <div class="login-container">
        <h2>GESTÃO DE ESTOQUE</h2>
        <span class="subtitle" style="color: #7f8c8d; font-size: 14px; margin-bottom: 30px; display: block;">Acessar Sistema</span>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Seu E-mail" required autocomplete="email">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        
        <button id="btnLogin">ENTRAR</button>
        
        <p id="error"></p>

        <div class="footer-text" style="margin-top: 30px; font-size: 12px; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px;">
            &copy; 2026 Móveis Simonetti<br>Developed by DB ®
        </div>
    </div>

<script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");
    const btnLogin = document.getElementById("btnLogin");
    const errorMsg = document.getElementById("error");

    async function realizarLogin() {
        const email = emailInput.value;
        const password = passInput.value;

        if (!email || !password) {
            errorMsg.innerText = "❌ Preencha todos os campos.";
            return;
        }

        btnLogin.innerText = "CARREGANDO...";
        btnLogin.disabled = true;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;
            
            // VERIFICAÇÃO CRUCIAL: O usuário tem documento na coleção 'users'?
            const userDoc = await getDoc(doc(db, "users", uid));
            
            if (!userDoc.exists() || userDoc.data().isFirstLogin !== false) {
                // Se não existe documento ou a flag de primeiro acesso ainda é true
                window.location.href = "first_login.html";
            } else {
                // Usuário já configurado, vai para o sistema
                window.location.href = "portal.html";
            }
        } catch (e) {
            btnLogin.innerText = "ENTRAR";
            btnLogin.disabled = false;
            errorMsg.innerText = "❌ Usuário ou senha incorretos.";
        }
    }

    btnLogin.onclick = realizarLogin;
    [emailInput, passInput].forEach(input => {
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') realizarLogin(); });
    });
</script>
</body>
</html>
