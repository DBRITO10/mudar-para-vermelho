<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADMINISTRATIVO</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#002d5f">

    <style>
    :root {
        --primary: #d32f2f;
        --secondary: #fdf2f2;
        --accent: #d32f2f;
        --text-dark: #333333;
        --white: #ffffff;
        --border-color: #f0d8d8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: var(--secondary);
        color: var(--text-dark);
        padding: 20px;
    }

    /* Barra Superior Ajustada */
    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--white);
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        z-index: 1000;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-dark);
    }

    .user-info i {
        color: var(--primary);
        font-size: 1.1rem;
    }

    .logout-btn {
        background: transparent;
        color: #d32f2f;
        border: 1.5px solid #d32f2f;
        padding: 6px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .logout-btn:hover { 
        background: #d32f2f; 
        color: white; 
    }

    /* Título mais alto e maior no Desktop */
    .header-title { 
        margin: 80px 0 40px; /* Reduzi a margem superior de 100px para 80px */
        text-align: center; 
    }
    
    .header-title h1 { 
        color: var(--text-dark); 
        font-size: 2.8rem; /* Aumentado de 2.2rem */
        letter-spacing: -1px;
    }
    
    .header-title span { color: var(--primary); }

    /* Cards */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 900px;
        margin-top: 10px;
    }

    .card {
        padding: 50px 20px;
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        text-align: center;
        text-decoration: none;
        color: var(--text-dark);
        transition: 0.3s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .card:hover { 
        border-color: var(--primary); 
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(211, 47, 47, 0.1);
    }
    
    .card .icon { font-size: 35px; margin-bottom: 15px; color: var(--primary); }
    .card h2 { font-size: 1.3rem; margin-bottom: 5px; }
    .card p { font-size: 0.9rem; opacity: 0.7; }

    #btnInstall {
        display: none;
        margin-top: 30px;
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
    }

    .footer-credits { margin-top: auto; padding: 20px; color: #999; font-size: 0.75rem; }

    /* Ajustes para Celular */
    @media (max-width: 600px) { 
        .header-title h1 { font-size: 2rem; }
        .header-title { margin-top: 70px; }
        .container { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
    <nav class="top-bar">
        <div class="user-info">
            <i class="fas fa-home"></i> 
            <span id="displayName">Carregando...</span>
        </div>
        <button id="btnSair" class="logout-btn">
            Sair <i class="fas fa-sign-out-alt"></i>
        </button>
    </nav>

    <div class="header-title">
        <h1>Painel <span>Administrativo</span> </h1>
        <p style="opacity: 0.8; margin-top: 8px; font-size: 1rem;">Escolha como deseja continuar:</p>
    </div>

    <div class="container">
        <a href="admin_painel.html" class="card">
            <span class="icon"><i class="fas fa-truck-moving"></i></span>
            <h2>TRANSBORDO</h2>
            <p>Acessar Sistema</p>
        </a>

        <a href="pagina.html" class="card">
            <span class="icon"><i class="fas fa-tools"></i></span>
            <h2>PULMÃO DE PEÇAS</h2>
            <p>Acessar Sistema</p>
        </a>
    </div>

    <button id="btnInstall">
        <i class="fas fa-mobile-alt"></i> INSTALAR APLICATIVO
    </button>

    <footer class="footer-credits">
        <p>&copy; 2026 Móveis Simonetti - Developed by DB</p>
    </footer>

    <script type="module">
        import { auth, db } from "./js/firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        document.getElementById("displayName").innerText = userDoc.data().nomeCompleto;
                    } else {
                        document.getElementById("displayName").innerText = user.email;
                    }
                } catch (e) {
                    document.getElementById("displayName").innerText = "Usuário";
                }
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById("btnSair").onclick = () => {
            signOut(auth).then(() => window.location.href = "index.html");
        };

        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block';
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    btnInstall.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            btnInstall.style.display = 'none';
            deferredPrompt = null;
        });
    </script>
</body>
</html>
